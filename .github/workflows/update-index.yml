name: Auto Update Index

on:
  push:
    branches:
      - main
    paths:
      - '*.html'
      - '*.pdf'
      - '*.log'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate index.html
        run: |
          cat << 'EOF' > index.html
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Automation Reports</title>
            <style>
              :root {
                color-scheme: light;
                font-family: Arial, Helvetica, sans-serif;
                color: #1f2937;
                background: #f5f7fb;
              }
              body { margin: 0; padding: 32px; }
              main { max-width: 860px; margin: 0 auto; }
              h1 { margin: 0 0 8px; font-size: 32px; line-height: 1.2; }
              p { margin: 0 0 24px; color: #5b6472; }
              ul { display: grid; gap: 12px; margin: 0; padding: 0; list-style: none; }
              li { display: flex; gap: 10px; align-items: center; background: #fff; padding: 16px 18px; border: 1px solid #d8dee9; border-radius: 8px; }
              .report-title { flex-grow: 1; font-weight: 700; color: #075985; word-break: break-all; }
              a { text-decoration: none; color: #0ea5e9; font-weight: bold; white-space: nowrap; }
              a:hover { color: #0369a1; text-decoration: underline; }
            </style>
          </head>
          <body>
            <main>
              <h1>Automation Reports</h1>
              <p>Latest generated report files.</p>
              <ul>
          EOF
          
          # Sort HTML files by modification time (newest first)
          for html_file in $(ls -t *.html 2>/dev/null | grep -v '^index.html$'); do
            base_name="${html_file%.html}"
            echo "<li>" >> index.html
            echo "<span class=\"report-title\">$base_name</span>" >> index.html
            echo "<a href=\"$html_file\">HTML</a>" >> index.html
            
            if [ -f "$base_name.pdf" ]; then
              echo "| <a href=\"$base_name.pdf\">PDF</a>" >> index.html
            fi
            
            timestamp=$(echo "$base_name" | grep -oE '[0-9]{8}_[0-9]{6}' || true)
            if [ ! -z "$timestamp" ]; then
              log_file=$(ls *.log 2>/dev/null | grep "$timestamp" | head -n 1)
              if [ ! -z "$log_file" ] && [ -f "$log_file" ]; then
                echo "| <a href=\"$log_file\">LOG</a>" >> index.html
              fi
            fi
            
            echo "</li>" >> index.html
          done
          
          cat << 'EOF' >> index.html
              </ul>
            </main>
          </body>
          </html>
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update index.html with latest reports" && git push)
